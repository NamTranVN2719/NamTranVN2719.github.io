<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Tư Vấn Nghề</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sticky Navbar -->
    <nav id="navbar" class="navbar">
        <div class="nav-container">
            <div class="nav-logo">Tư Vấn Nghề</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Trang chủ</a></li>
                <li><a href="careers.html" class="nav-link">Ngành nghề</a></li>
                <li><a href="about.html" class="nav-link">Giới thiệu</a></li>
                <li><a href="contact.html" class="nav-link active">Liên hệ</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>📞 Liên Hệ Với Chúng Tôi</h1>
            <p>Hãy liên hệ nếu bạn cần tư vấn thêm về chọn nghề</p>
        </header>

        <main>
            <div class="content-wrapper">
                <section class="contact-section">
                    <div class="contact-container">
                        <div class="contact-left">
                            <h2>Thông Tin Liên Hệ</h2>
                            <div class="contact-item">
                                <span class="contact-icon">📧</span>
                                <div>
                                    <strong>Email:</strong><br>
                                    nam45444544@gmail.com
                                </div>
                            </div>
                            <div class="contact-item">
                                <span class="contact-icon">📘</span>
                                <div>
                                    <strong>Facebook:</strong><br>
                                    Tư Vấn Nghề Cho Học Sinh
                                </div>
                            </div>
                            <div class="contact-item">
                                <span class="contact-icon">🏫</span>
                                <div>
                                    <strong>Trường:</strong><br>
                                    THPT Chuyên Tiền Giang
                                </div>
                            </div>
                        </div>

                        <div class="contact-right">
                            <h2>Gửi Tin Nhắn</h2>
                            <form id="contactForm" onsubmit="handleContactSubmit(event)">
                                <div class="form-group">
                                    <label for="name">Họ và tên *</label>
                                    <input type="text" id="name" name="name" required>
                                </div>

                                <div class="form-group">
                                    <label for="email">Email *</label>
                                    <input type="email" id="email" name="email" required>
                                </div>

                                <div class="form-group">
                                    <label for="message">Tin nhắn *</label>
                                    <textarea id="message" name="message" rows="5" required placeholder="Hãy chia sẻ câu hỏi hoặc góp ý của bạn..."></textarea>
                                </div>

                                <button type="submit" class="btn-submit">📤 Gửi Tin Nhắn</button>
                            </form>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top" onclick="scrollToTop()">
        <span>↑</span>
    </button>

    <script src="contact.js"></script>
</body>
</html>
